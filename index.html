<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ZYJobs">
    <title>ZYJobs - 求职信息管理台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif; }
        .modal-overlay { animation: fadeIn 0.2s ease; }
        .modal-box { animation: slideUp 0.25s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .job-card { animation: cardIn 0.25s ease; }
        @keyframes cardIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .expand-content { overflow: hidden; transition: max-height 0.3s ease, opacity 0.2s ease; }
        .expand-content.collapsed { max-height: 0; opacity: 0; }
        .expand-content.expanded { max-height: 600px; opacity: 1; }
        textarea, input, select { font-size: 16px !important; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50 min-h-screen">

<div id="app" class="max-w-2xl mx-auto p-4 pb-24">
    <!-- Header -->
    <div class="mb-5">
        <h1 class="text-2xl font-bold text-gray-800">📋 ZYJobs</h1>
        <p class="text-gray-400 text-sm mt-0.5">粘贴职位信息 → 自动提取 → 按截止日期排序</p>
    </div>

    <!-- Stats -->
    <div id="stats" class="grid grid-cols-4 gap-2 mb-4"></div>

    <!-- Actions -->
    <div class="flex flex-col gap-3 mb-4">
        <button onclick="openPasteModal()" class="flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-medium px-5 py-3 rounded-xl shadow-sm transition-colors text-sm">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><path d="M9 14l2 2 4-4"/></svg>
            粘贴新职位信息
        </button>
        <div class="flex gap-2">
            <div class="flex-1 relative">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                <input id="searchInput" type="text" placeholder="搜索..." oninput="handleSearch(this.value)"
                    class="w-full pl-9 pr-3 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
            </div>
            <select id="sourceFilter" onchange="handleFilterSource(this.value)"
                class="border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 min-w-0 max-w-32">
                <option value="全部">全部</option>
            </select>
        </div>
        <label class="flex items-center gap-2 text-sm text-gray-500 cursor-pointer">
            <input type="checkbox" id="showExpiredCheck" onchange="handleToggleExpired(this.checked)" class="rounded accent-blue-600">
            显示已截止的职位
        </label>
    </div>

    <!-- Job List -->
    <div id="jobList" class="space-y-3"></div>
</div>

<!-- Paste Modal -->
<div id="pasteModal" class="fixed inset-0 bg-black/50 flex items-end sm:items-center justify-center z-50 p-0 sm:p-4 hidden modal-overlay" onclick="closePasteModal(event)">
    <div class="modal-box bg-white rounded-t-2xl sm:rounded-2xl shadow-xl w-full sm:max-w-lg max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
        <div class="flex items-center justify-between p-4 border-b sticky top-0 bg-white z-10 rounded-t-2xl">
            <h2 id="pasteModalTitle" class="text-lg font-semibold text-gray-800">📋 粘贴职位信息</h2>
            <button onclick="closePasteModal()" class="p-2 hover:bg-gray-100 rounded-xl text-gray-500">✕</button>
        </div>
        <div class="p-4">
            <!-- Step 0: Paste -->
            <div id="pasteStep0">
                <p class="text-sm text-gray-500 mb-3">将从 JobsDB、微信公众号或其他渠道复制的职位信息粘贴到下方，系统会自动尝试提取关键信息。</p>
                <textarea id="rawTextInput" rows="8" placeholder="在此粘贴职位信息...&#10;&#10;例如：&#10;【前端开发工程师】&#10;公司：ABC科技&#10;地点：深圳&#10;截止日期：2026-05-01&#10;所需材料：简历、作品集"
                    class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
                <div class="flex gap-3 mt-4">
                    <button onclick="closePasteModal()" class="flex-1 py-2.5 rounded-xl border border-gray-300 text-gray-600 text-sm hover:bg-gray-50 active:bg-gray-100">取消</button>
                    <button onclick="handleParse()" class="flex-1 py-2.5 rounded-xl bg-blue-600 text-white text-sm hover:bg-blue-700 active:bg-blue-800 font-medium">提取信息 →</button>
                </div>
            </div>
            <!-- Step 1: Confirm -->
            <div id="pasteStep1" class="hidden">
                <div class="bg-blue-50 border border-blue-200 rounded-lg p-3 mb-4 text-sm text-blue-700">
                    💡 已自动提取以下信息，请检查并补充修正。
                </div>
                <div id="formFields" class="space-y-3"></div>
                <div class="flex gap-3 mt-4">
                    <button onclick="goBackToPaste()" class="flex-1 py-2.5 rounded-xl border border-gray-300 text-gray-600 text-sm hover:bg-gray-50">← 返回</button>
                    <button onclick="handleSaveNew()" class="flex-1 py-2.5 rounded-xl bg-blue-600 text-white text-sm hover:bg-blue-700 active:bg-blue-800 font-medium">✓ 保存职位</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div id="editModal" class="fixed inset-0 bg-black/50 flex items-end sm:items-center justify-center z-50 p-0 sm:p-4 hidden modal-overlay" onclick="closeEditModal(event)">
    <div class="modal-box bg-white rounded-t-2xl sm:rounded-2xl shadow-xl w-full sm:max-w-lg max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
        <div class="flex items-center justify-between p-4 border-b sticky top-0 bg-white z-10 rounded-t-2xl">
            <h2 class="text-lg font-semibold text-gray-800">✏️ 编辑职位</h2>
            <button onclick="closeEditModal()" class="p-2 hover:bg-gray-100 rounded-xl text-gray-500">✕</button>
        </div>
        <div class="p-4">
            <div id="editFormFields" class="space-y-3"></div>
            <div class="flex gap-3 mt-4">
                <button onclick="closeEditModal()" class="flex-1 py-2.5 rounded-xl border border-gray-300 text-gray-600 text-sm hover:bg-gray-50">取消</button>
                <button onclick="handleSaveEdit()" class="flex-1 py-2.5 rounded-xl bg-blue-600 text-white text-sm hover:bg-blue-700 active:bg-blue-800 font-medium">保存修改</button>
            </div>
        </div>
    </div>
</div>

<!-- Delete Confirm Modal -->
<div id="deleteModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4 hidden modal-overlay" onclick="closeDeleteModal()">
    <div class="modal-box bg-white rounded-2xl shadow-xl w-full max-w-sm p-6 text-center" onclick="event.stopPropagation()">
        <div class="text-4xl mb-3">🗑️</div>
        <h3 class="text-lg font-semibold text-gray-800 mb-2">确认删除？</h3>
        <p id="deleteJobName" class="text-sm text-gray-500 mb-5"></p>
        <div class="flex gap-3">
            <button onclick="closeDeleteModal()" class="flex-1 py-2.5 rounded-xl border border-gray-300 text-gray-600 text-sm hover:bg-gray-50">取消</button>
            <button onclick="confirmDelete()" class="flex-1 py-2.5 rounded-xl bg-red-600 text-white text-sm hover:bg-red-700 font-medium">删除</button>
        </div>
    </div>
</div>

<script>
// ===== SOURCES =====
const SOURCES = ['JobsDB', '微信公众号', 'LinkedIn', 'Indeed', 'Boss直聘', '猎聘', '小红书', '其他'];

// ===== STATE =====
let state = {
    jobs: [],
    searchQuery: '',
    filterSource: '全部',
    showExpired: false,
    expandedId: null,
};
let editingId = null;
let deletingId = null;

// ===== LOCAL STORAGE =====
function loadState() {
    try {
        const saved = localStorage.getItem('zyjobs_data');
        if (saved) {
            const parsed = JSON.parse(saved);
            if (Array.isArray(parsed)) state.jobs = parsed;
        }
    } catch (e) { console.log('Load failed:', e); }
}

function saveState() {
    try {
        localStorage.setItem('zyjobs_data', JSON.stringify(state.jobs));
    } catch (e) { console.log('Save failed:', e); }
}

// ===== PARSING =====
function normalizeDate(str) {
    if (!str) return '';
    const cleaned = str.replace(/[年月./]/g, '-').replace(/[日号]/g, '');
    const parts = cleaned.split('-').filter(Boolean);
    if (parts.length === 3) {
        const y = parts[0].length <= 2 ? '20' + parts[0] : parts[0];
        const m = parts[1].padStart(2, '0');
        const d = parts[2].padStart(2, '0');
        return `${y}-${m}-${d}`;
    }
    return str;
}

function parseDates(text) {
    const deadlinePatterns = [
        /截止[日期时间：:\s]*(\d{4}[-/年.]\d{1,2}[-/月.]\d{1,2}[日号]?)/,
        /(\d{4}[-/年.]\d{1,2}[-/月.]\d{1,2}[日号]?)[\s]*截止/,
        /deadline[:\s]*(\d{4}[-/]\d{1,2}[-/]\d{1,2})/i,
        /closing\s*date[:\s]*(\d{4}[-/]\d{1,2}[-/]\d{1,2})/i,
        /截止[日期时间：:\s]*(\d{1,2}[-/月.]\d{1,2}[日号]?)/,
        /before[:\s]*(\d{4}[-/]\d{1,2}[-/]\d{1,2})/i,
        /by[:\s]*(\d{4}[-/]\d{1,2}[-/]\d{1,2})/i,
        /due[:\s]*(\d{4}[-/]\d{1,2}[-/]\d{1,2})/i,
    ];
    const publishPatterns = [
        /发布[日期时间：:\s]*(\d{4}[-/年.]\d{1,2}[-/月.]\d{1,2}[日号]?)/,
        /posted[:\s]*(\d{4}[-/]\d{1,2}[-/]\d{1,2})/i,
        /发布于[：:\s]*(\d{4}[-/年.]\d{1,2}[-/月.]\d{1,2}[日号]?)/,
    ];
    let deadline = '';
    let publishDate = '';
    for (const p of deadlinePatterns) {
        const m = text.match(p);
        if (m) { deadline = normalizeDate(m[1]); break; }
    }
    for (const p of publishPatterns) {
        const m = text.match(p);
        if (m) { publishDate = normalizeDate(m[1]); break; }
    }
    return { deadline, publishDate };
}

function parseJobTitle(text) {
    const patterns = [
        /(?:岗位|职位|招聘)[名称：:\s]*[【\[]?([^\n【\]】]{2,30})[】\]]?/,
        /(?:position|job\s*title|role)[:\s]*(.{2,50})/i,
    ];
    for (const p of patterns) {
        const m = text.match(p);
        if (m) return m[1].trim();
    }
    const lines = text.trim().split('\n');
    const firstLine = lines[0] || '';
    if (firstLine.length <= 60 && firstLine.length >= 2) {
        return firstLine.replace(/^[【\[#\s*]+/, '').replace(/[】\]\s*]+$/, '');
    }
    return '';
}

function parseCompany(text) {
    const patterns = [
        /(?:公司|企业|单位|机构|雇主)[名称：:\s]*([^\n]{2,40})/,
        /(?:company|employer|organization|firm)[:\s]*([^\n]{2,50})/i,
    ];
    for (const p of patterns) {
        const m = text.match(p);
        if (m) return m[1].trim().split(/[,，;；]/)[0];
    }
    return '';
}

function parseMaterials(text) {
    const patterns = [
        /(?:所需材料|申请材料|提交材料|需要材料|required\s*(?:documents|materials))[：:\s]*([\s\S]{5,200}?)(?:\n\n|\n[^\s]|$)/i,
        /(?:请提交|请准备|需提供|please\s*(?:submit|prepare|provide))[：:\s]*([\s\S]{5,200}?)(?:\n\n|\n[^\s]|$)/i,
    ];
    for (const p of patterns) {
        const m = text.match(p);
        if (m) return m[1].trim();
    }
    const keywords = ['简历', 'CV', 'resume', 'cover letter', '求职信', '推荐信', '成绩单', 'transcript', '证书', '作品集', 'portfolio'];
    const found = keywords.filter(k => text.toLowerCase().includes(k.toLowerCase()));
    if (found.length > 0) return found.join('、');
    return '';
}

function parseLocation(text) {
    const patterns = [
        /(?:工作地点|地点|地址|工作地|location|work\s*location|地区)[：:\s]*([^\n]{2,30})/i,
    ];
    for (const p of patterns) {
        const m = text.match(p);
        if (m) return m[1].trim().split(/[,，;；]/)[0];
    }
    return '';
}

// ===== URGENCY =====
function getDaysUntil(dateStr) {
    if (!dateStr) return null;
    const target = new Date(dateStr + 'T23:59:59');
    const now = new Date();
    now.setHours(0, 0, 0, 0);
    return Math.ceil((target - now) / (86400000));
}

function getUrgencyInfo(dateStr) {
    const days = getDaysUntil(dateStr);
    if (days === null) return { level: 'unknown', label: '未设截止日', color: 'gray' };
    if (days < 0) return { level: 'expired', label: `已截止 ${Math.abs(days)} 天`, color: 'gray' };
    if (days === 0) return { level: 'today', label: '🔥 今天截止！', color: 'red' };
    if (days <= 3) return { level: 'urgent', label: `⚡ ${days}天后截止`, color: 'red' };
    if (days <= 7) return { level: 'soon', label: `${days}天后截止`, color: 'orange' };
    if (days <= 14) return { level: 'normal', label: `${days}天后截止`, color: 'yellow' };
    return { level: 'relaxed', label: `${days}天后截止`, color: 'green' };
}

const urgencyBadge = {
    red: 'background:#fef2f2;color:#b91c1c;border:1px solid #fca5a5',
    orange: 'background:#fff7ed;color:#c2410c;border:1px solid #fdba74',
    yellow: 'background:#fefce8;color:#a16207;border:1px solid #fde047',
    green: 'background:#f0fdf4;color:#15803d;border:1px solid #86efac',
    gray: 'background:#f3f4f6;color:#6b7280;border:1px solid #d1d5db',
};

const urgencyBorder = { red: '#ef4444', orange: '#f97316', yellow: '#eab308', green: '#22c55e', gray: '#d1d5db' };

// ===== RENDER =====
function render() {
    renderStats();
    renderSourceFilter();
    renderJobList();
}

function renderStats() {
    const total = state.jobs.length;
    const active = state.jobs.filter(j => { const d = getDaysUntil(j.deadline); return d === null || d >= 0; }).length;
    const urgent = state.jobs.filter(j => { const d = getDaysUntil(j.deadline); return d !== null && d >= 0 && d <= 3; }).length;
    const applied = state.jobs.filter(j => j.status === 'applied').length;

    document.getElementById('stats').innerHTML = `
        <div class="bg-white rounded-xl p-3 shadow-sm border border-gray-100 text-center">
            <div class="text-xl font-bold text-blue-600">${total}</div>
            <div class="text-xs text-gray-400">总职位</div>
        </div>
        <div class="bg-white rounded-xl p-3 shadow-sm border border-gray-100 text-center">
            <div class="text-xl font-bold text-green-600">${active}</div>
            <div class="text-xs text-gray-400">进行中</div>
        </div>
        <div class="bg-white rounded-xl p-3 shadow-sm border border-gray-100 text-center">
            <div class="text-xl font-bold text-red-600">${urgent}</div>
            <div class="text-xs text-gray-400">≤3天</div>
        </div>
        <div class="bg-white rounded-xl p-3 shadow-sm border border-gray-100 text-center">
            <div class="text-xl font-bold text-purple-600">${applied}</div>
            <div class="text-xs text-gray-400">已投递</div>
        </div>
    `;
}

function renderSourceFilter() {
    const sources = new Set(state.jobs.map(j => j.source).filter(Boolean));
    const sel = document.getElementById('sourceFilter');
    const current = sel.value;
    sel.innerHTML = '<option value="全部">全部来源</option>' +
        Array.from(sources).map(s => `<option value="${esc(s)}"${s === current ? ' selected' : ''}>${esc(s)}</option>`).join('');
    if (current !== '全部' && !sources.has(current)) sel.value = '全部';
}

function getSortedFilteredJobs() {
    let filtered = state.jobs.filter(j => {
        if (state.searchQuery) {
            const q = state.searchQuery.toLowerCase();
            const match = (j.title || '').toLowerCase().includes(q) ||
                (j.company || '').toLowerCase().includes(q) ||
                (j.location || '').toLowerCase().includes(q);
            if (!match) return false;
        }
        if (state.filterSource !== '全部' && j.source !== state.filterSource) return false;
        if (!state.showExpired) {
            const days = getDaysUntil(j.deadline);
            if (days !== null && days < 0) return false;
        }
        return true;
    });
    return filtered.sort((a, b) => {
        if (!a.deadline && !b.deadline) return 0;
        if (!a.deadline) return 1;
        if (!b.deadline) return -1;
        return new Date(a.deadline) - new Date(b.deadline);
    });
}

function renderJobList() {
    const jobs = getSortedFilteredJobs();
    const container = document.getElementById('jobList');

    if (jobs.length === 0) {
        container.innerHTML = `
            <div class="text-center py-16 text-gray-300">
                <div class="text-5xl mb-3">📭</div>
                <p class="text-lg text-gray-400">暂无职位信息</p>
                <p class="text-sm text-gray-300 mt-1">点击上方「粘贴新职位信息」开始添加</p>
            </div>
        `;
        return;
    }

    container.innerHTML = jobs.map((job, idx) => {
        const urgency = getUrgencyInfo(job.deadline);
        const isExpanded = state.expandedId === job.id;
        const isApplied = job.status === 'applied';
        const borderColor = urgencyBorder[urgency.color];

        return `
        <div class="job-card bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden ${isApplied ? 'opacity-60' : ''}"
             style="border-left:4px solid ${borderColor}; animation-delay:${idx * 30}ms">
            <div class="p-4 cursor-pointer active:bg-gray-50 transition-colors" onclick="toggleExpand(${job.id})">
                <div class="flex items-start justify-between gap-2">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 flex-wrap mb-1.5">
                            <h3 class="font-semibold text-gray-800 text-sm ${isApplied ? 'line-through' : ''}">${esc(job.title || '未命名职位')}</h3>
                            <span class="text-xs px-2 py-0.5 rounded-full whitespace-nowrap" style="${urgencyBadge[urgency.color]}">${urgency.label}</span>
                            ${isApplied ? '<span class="text-xs px-2 py-0.5 rounded-full bg-purple-100 text-purple-700 border border-purple-200">已投递</span>' : ''}
                        </div>
                        <div class="flex items-center gap-3 text-xs text-gray-400 flex-wrap">
                            ${job.company ? `<span>🏢 ${esc(job.company)}</span>` : ''}
                            ${job.location ? `<span>📍 ${esc(job.location)}</span>` : ''}
                            <span>📅 ${job.deadline || '未知'}</span>
                            ${job.source ? `<span class="bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full">${esc(job.source)}</span>` : ''}
                        </div>
                    </div>
                    <div class="text-gray-300 shrink-0 mt-1">${isExpanded ? '▲' : '▼'}</div>
                </div>
            </div>
            <div class="expand-content ${isExpanded ? 'expanded' : 'collapsed'}">
                <div class="px-4 pb-4 border-t border-gray-50 pt-3">
                    <div class="grid grid-cols-2 gap-3 text-sm mb-3">
                        <div>
                            <div class="text-xs text-gray-300 mb-0.5">发布日期</div>
                            <div class="text-gray-600">${esc(job.publishDate || '未知')}</div>
                        </div>
                        <div>
                            <div class="text-xs text-gray-300 mb-0.5">截止日期</div>
                            <div class="text-gray-600 font-medium">${esc(job.deadline || '未知')}</div>
                        </div>
                        <div class="col-span-2">
                            <div class="text-xs text-gray-300 mb-0.5">所需材料</div>
                            <div class="text-gray-600">${esc(job.materials || '未填写')}</div>
                        </div>
                        ${job.notes ? `
                        <div class="col-span-2">
                            <div class="text-xs text-gray-300 mb-0.5">备注</div>
                            <div class="text-gray-600">${esc(job.notes)}</div>
                        </div>` : ''}
                        ${job.rawText ? `
                        <div class="col-span-2">
                            <div class="text-xs text-gray-300 mb-0.5">原始信息</div>
                            <div class="text-gray-400 text-xs bg-gray-50 rounded-lg p-2 mt-1 max-h-28 overflow-y-auto whitespace-pre-wrap">${esc(job.rawText)}</div>
                        </div>` : ''}
                    </div>
                    <div class="flex gap-2 flex-wrap">
                        <button onclick="event.stopPropagation();toggleStatus(${job.id})"
                            class="flex items-center gap-1 text-xs px-3 py-1.5 rounded-lg bg-purple-50 text-purple-700 hover:bg-purple-100 active:bg-purple-200 transition-colors">
                            ${isApplied ? '↩ 取消投递' : '✓ 标记已投递'}
                        </button>
                        <button onclick="event.stopPropagation();openEditModal(${job.id})"
                            class="flex items-center gap-1 text-xs px-3 py-1.5 rounded-lg bg-blue-50 text-blue-700 hover:bg-blue-100 active:bg-blue-200 transition-colors">
                            ✏️ 编辑
                        </button>
                        <button onclick="event.stopPropagation();openDeleteModal(${job.id})"
                            class="flex items-center gap-1 text-xs px-3 py-1.5 rounded-lg bg-red-50 text-red-700 hover:bg-red-100 active:bg-red-200 transition-colors">
                            🗑 删除
                        </button>
                    </div>
                </div>
            </div>
        </div>`;
    }).join('');
}

function esc(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// ===== FORM BUILDER =====
function buildFormHTML(prefix, data) {
    return `
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">职位名称 *</label>
        <input type="text" id="${prefix}_title" value="${esc(data.title || '')}"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="例：前端开发工程师">
    </div>
    <div class="grid grid-cols-2 gap-3">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">公司/机构</label>
            <input type="text" id="${prefix}_company" value="${esc(data.company || '')}"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">来源</label>
            <select id="${prefix}_source"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                ${SOURCES.map(s => `<option value="${s}"${s === (data.source || '其他') ? ' selected' : ''}>${s}</option>`).join('')}
            </select>
        </div>
    </div>
    <div class="grid grid-cols-2 gap-3">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">截止日期</label>
            <input type="date" id="${prefix}_deadline" value="${data.deadline || ''}"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">发布日期</label>
            <input type="date" id="${prefix}_publishDate" value="${data.publishDate || ''}"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
    </div>
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">工作地点</label>
        <input type="text" id="${prefix}_location" value="${esc(data.location || '')}"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">所需材料</label>
        <textarea id="${prefix}_materials" rows="2"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="简历、求职信、推荐信...">${esc(data.materials || '')}</textarea>
    </div>
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">备注</label>
        <textarea id="${prefix}_notes" rows="2"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">${esc(data.notes || '')}</textarea>
    </div>`;
}

function readForm(prefix) {
    return {
        title: document.getElementById(`${prefix}_title`)?.value || '',
        company: document.getElementById(`${prefix}_company`)?.value || '',
        source: document.getElementById(`${prefix}_source`)?.value || '其他',
        deadline: document.getElementById(`${prefix}_deadline`)?.value || '',
        publishDate: document.getElementById(`${prefix}_publishDate`)?.value || '',
        location: document.getElementById(`${prefix}_location`)?.value || '',
        materials: document.getElementById(`${prefix}_materials`)?.value || '',
        notes: document.getElementById(`${prefix}_notes`)?.value || '',
    };
}

// ===== EVENT HANDLERS =====
function handleSearch(val) { state.searchQuery = val; renderJobList(); }
function handleFilterSource(val) { state.filterSource = val; renderJobList(); }
function handleToggleExpired(checked) { state.showExpired = checked; renderJobList(); }
function toggleExpand(id) { state.expandedId = state.expandedId === id ? null : id; renderJobList(); }

function toggleStatus(id) {
    const job = state.jobs.find(j => j.id === id);
    if (job) {
        job.status = job.status === 'applied' ? 'active' : 'applied';
        saveState(); render();
    }
}

// ===== PASTE MODAL =====
let pasteRawText = '';

function openPasteModal() {
    pasteRawText = '';
    document.getElementById('rawTextInput').value = '';
    document.getElementById('pasteStep0').classList.remove('hidden');
    document.getElementById('pasteStep1').classList.add('hidden');
    document.getElementById('pasteModalTitle').textContent = '📋 粘贴职位信息';
    document.getElementById('pasteModal').classList.remove('hidden');
    setTimeout(() => document.getElementById('rawTextInput').focus(), 100);
}

function closePasteModal(e) {
    if (e && e.target !== e.currentTarget) return;
    document.getElementById('pasteModal').classList.add('hidden');
}

function handleParse() {
    const text = document.getElementById('rawTextInput').value.trim();
    if (!text) return;
    pasteRawText = text;

    const dates = parseDates(text);
    const parsed = {
        title: parseJobTitle(text),
        company: parseCompany(text),
        source: '其他',
        deadline: dates.deadline,
        publishDate: dates.publishDate || new Date().toISOString().split('T')[0],
        materials: parseMaterials(text),
        location: parseLocation(text),
        notes: '',
    };

    document.getElementById('formFields').innerHTML = buildFormHTML('new', parsed);
    document.getElementById('pasteStep0').classList.add('hidden');
    document.getElementById('pasteStep1').classList.remove('hidden');
    document.getElementById('pasteModalTitle').textContent = '✏️ 确认提取结果';
}

function goBackToPaste() {
    document.getElementById('pasteStep0').classList.remove('hidden');
    document.getElementById('pasteStep1').classList.add('hidden');
    document.getElementById('pasteModalTitle').textContent = '📋 粘贴职位信息';
}

function handleSaveNew() {
    const data = readForm('new');
    if (!data.title.trim()) {
        document.getElementById('new_title').style.borderColor = '#ef4444';
        document.getElementById('new_title').focus();
        return;
    }
    const newJob = {
        ...data,
        id: Date.now(),
        rawText: pasteRawText,
        status: 'active',
    };
    state.jobs.push(newJob);
    saveState();
    document.getElementById('pasteModal').classList.add('hidden');
    render();
}

// ===== EDIT MODAL =====
function openEditModal(id) {
    editingId = id;
    const job = state.jobs.find(j => j.id === id);
    if (!job) return;
    document.getElementById('editFormFields').innerHTML = buildFormHTML('edit', job);
    document.getElementById('editModal').classList.remove('hidden');
}

function closeEditModal(e) {
    if (e && e.target !== e.currentTarget) return;
    document.getElementById('editModal').classList.add('hidden');
    editingId = null;
}

function handleSaveEdit() {
    if (!editingId) return;
    const data = readForm('edit');
    if (!data.title.trim()) {
        document.getElementById('edit_title').style.borderColor = '#ef4444';
        document.getElementById('edit_title').focus();
        return;
    }
    const job = state.jobs.find(j => j.id === editingId);
    if (job) {
        Object.assign(job, data);
        saveState();
    }
    document.getElementById('editModal').classList.add('hidden');
    editingId = null;
    render();
}

// ===== DELETE MODAL =====
function openDeleteModal(id) {
    deletingId = id;
    const job = state.jobs.find(j => j.id === id);
    document.getElementById('deleteJobName').textContent = job ? `「${job.title || '未命名'}」将被永久删除` : '';
    document.getElementById('deleteModal').classList.remove('hidden');
}

function closeDeleteModal() {
    document.getElementById('deleteModal').classList.add('hidden');
    deletingId = null;
}

function confirmDelete() {
    if (deletingId) {
        state.jobs = state.jobs.filter(j => j.id !== deletingId);
        saveState();
        if (state.expandedId === deletingId) state.expandedId = null;
    }
    closeDeleteModal();
    render();
}

// ===== INIT =====
loadState();
render();
</script>

</body>
</html>
