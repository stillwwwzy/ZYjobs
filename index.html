<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ZYJobs">
    <title>ZYJobs - 求职管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <style>
        *{-webkit-tap-highlight-color:transparent}
        body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,"Noto Sans SC","PingFang SC",sans-serif;background:linear-gradient(135deg,#f0f4ff 0%,#fef9ef 50%,#f0f4ff 100%);min-height:100vh}
        .glass-card{background:rgba(255,255,255,0.88);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.7)}
        .job-card{animation:cardIn .3s ease-out}
        @keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        .modal-overlay{animation:fadeIn .2s ease}
        .modal-box{animation:slideUp .3s cubic-bezier(.16,1,.3,1)}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        .countdown-urgent{animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
        .raw-text{max-height:120px;overflow-y:auto}
        textarea,input,select{font-size:16px!important}
        .btn-action{transition:transform .1s}
        .btn-action:active{transform:scale(.96)}
        ::-webkit-scrollbar{width:4px}
        ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
    </style>
</head>
<body>
<div id="app" class="max-w-2xl mx-auto p-4 pb-28">

    <!-- Header -->
    <div class="mb-5">
        <div class="flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-bold text-gray-800 flex items-center gap-2">📋 ZYJobs</h1>
                <p class="text-gray-400 text-xs mt-1">粘贴职位信息 → 自动提取 → 按截止日期排序</p>
            </div>
            <div id="syncStatus" class="text-xs px-2.5 py-1 rounded-full bg-gray-100 text-gray-400">⏳ 连接中</div>
        </div>
    </div>

    <!-- Stats -->
    <div id="stats" class="grid grid-cols-4 gap-2 mb-4"></div>

    <!-- Actions -->
    <div class="flex flex-col gap-3 mb-5">
        <button onclick="openAddModal()" class="btn-action flex items-center justify-center gap-2 bg-gradient-to-r from-blue-500 to-blue-600 text-white font-semibold px-5 py-3.5 rounded-2xl shadow-lg shadow-blue-500/25 text-sm">
            📌 粘贴新职位信息
        </button>
        <div class="flex gap-2">
            <button onclick="setFilter('all')" data-filter="all" class="filter-btn px-3.5 py-1.5 rounded-full text-xs font-semibold bg-blue-500 text-white shadow-sm">全部</button>
            <button onclick="setFilter('待投递')" data-filter="待投递" class="filter-btn px-3.5 py-1.5 rounded-full text-xs font-medium bg-white text-gray-500 shadow-sm">⏳ 待投递</button>
            <button onclick="setFilter('已投递')" data-filter="已投递" class="filter-btn px-3.5 py-1.5 rounded-full text-xs font-medium bg-white text-gray-500 shadow-sm">✅ 已投递</button>
        </div>
    </div>

    <!-- Job List -->
    <div id="jobList"></div>

    <!-- Empty State -->
    <div id="emptyState" class="hidden text-center py-16">
        <div class="text-5xl mb-3">📭</div>
        <p class="text-gray-400 text-sm">还没有职位信息</p>
        <p class="text-gray-300 text-xs mt-1">点击上方按钮添加</p>
    </div>
</div>

<!-- Modal -->
<div id="modal" class="hidden fixed inset-0 z-50">
    <div class="modal-overlay fixed inset-0 bg-black/40" onclick="closeModal()"></div>
    <div class="modal-box fixed inset-x-3 top-[5%] bottom-[5%] bg-white rounded-2xl shadow-2xl flex flex-col overflow-hidden max-w-lg mx-auto">
        <div class="flex items-center justify-between p-4 border-b border-gray-100">
            <h2 id="modalTitle" class="font-bold text-lg text-gray-800">📌 添加职位</h2>
            <button onclick="closeModal()" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 text-gray-400 text-xl">&times;</button>
        </div>
        <div class="flex-1 overflow-y-auto p-4 space-y-4">
            <div>
                <label class="text-xs font-medium text-gray-500 mb-1 block">📋 粘贴原始招聘信息</label>
                <textarea id="rawInput" rows="5" class="w-full border border-gray-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none" placeholder="粘贴招聘公告全文，点击下方按钮自动提取…"></textarea>
                <button onclick="extractFromRaw()" class="mt-2 px-4 py-2 bg-amber-50 text-amber-700 rounded-xl text-xs font-semibold border border-amber-200 btn-action">🔍 智能提取</button>
            </div>
            <div class="border-t border-dashed border-gray-200 pt-4"></div>
            <div class="grid grid-cols-1 gap-3">
                <div>
                    <label class="text-xs font-medium text-gray-500 mb-1 block">岗位名称 *</label>
                    <input id="fTitle" type="text" class="w-full border border-gray-200 rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-blue-500" placeholder="如：业务主管">
                </div>
                <div>
                    <label class="text-xs font-medium text-gray-500 mb-1 block">🏢 招聘单位</label>
                    <input id="fCompany" type="text" class="w-full border border-gray-200 rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-blue-500" placeholder="如：广州海洋实验室">
                </div>
                <div>
                    <label class="text-xs font-medium text-gray-500 mb-1 block">📍 工作地点</label>
                    <input id="fLocation" type="text" class="w-full border border-gray-200 rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-blue-500" placeholder="如：广州市南沙区">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-xs font-medium text-gray-500 mb-1 block">📅 发布日期</label>
                        <input id="fPublishDate" type="date" class="w-full border border-gray-200 rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="text-xs font-medium text-gray-500 mb-1 block">⏰ 截止日期 *</label>
                        <input id="fDeadline" type="date" class="w-full border border-gray-200 rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                <div>
                    <label class="text-xs font-medium text-gray-500 mb-1 block">📎 所需材料</label>
                    <input id="fMaterials" type="text" class="w-full border border-gray-200 rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-blue-500" placeholder="如：简历、证书">
                </div>
                <div>
                    <label class="text-xs font-medium text-gray-500 mb-1 block">🔗 信息来源</label>
                    <input id="fSource" type="text" class="w-full border border-gray-200 rounded-xl p-2.5 text-sm focus:ring-2 focus:ring-blue-500" placeholder="如：微信公众号、官网">
                </div>
            </div>
        </div>
        <div class="p-4 border-t border-gray-100">
            <button onclick="saveJob()" class="w-full py-3 bg-gradient-to-r from-blue-500 to-blue-600 text-white rounded-xl font-semibold text-sm btn-action shadow-lg shadow-blue-500/25">💾 保存</button>
        </div>
    </div>
</div>

<script>
// ============ FIREBASE CONFIG ============
const FIREBASE_CONFIG = {
    apiKey: "AIzaSyBEvHKR3qvlgqeKQzy3GHio258Tc9-doqU",
    authDomain: "zyjobs-5c05e.firebaseapp.com",
    projectId: "zyjobs-5c05e",
    storageBucket: "zyjobs-5c05e.firebasestorage.app",
    messagingSenderId: "521015429937",
    appId: "1:521015429937:web:2e40a6a5faa0ab77eafe10",
    measurementId: "G-GSNWDW6FEM"
};
// =========================================

const STORAGE_KEY = 'zyjobs_data';
const COLLECTION = 'jobs';
let db = null, useFirebase = false;
let jobs = [], currentFilter = 'all', editingId = null;

// ============ INIT ============
(async function init() {
    if (FIREBASE_CONFIG) {
        try {
            firebase.initializeApp(FIREBASE_CONFIG);
            db = firebase.firestore();
            useFirebase = true;
            document.getElementById('syncStatus').innerHTML = '☁️ 云同步';
            document.getElementById('syncStatus').className = 'text-xs px-2.5 py-1 rounded-full bg-green-50 text-green-600';
        } catch(e) {
            console.warn('Firebase init failed, using localStorage', e);
            document.getElementById('syncStatus').innerHTML = '💾 本地';
            document.getElementById('syncStatus').className = 'text-xs px-2.5 py-1 rounded-full bg-gray-100 text-gray-400';
        }
    }
    await loadJobs();
    render();
})();

// ============ STORAGE ============
async function loadJobs() {
    if (useFirebase) {
        try {
            const snap = await db.collection(COLLECTION).get();
            jobs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            localStorage.setItem(STORAGE_KEY, JSON.stringify(jobs));
            return;
        } catch(e) { console.warn('Firebase load failed', e); }
    }
    try {
        const data = localStorage.getItem(STORAGE_KEY);
        jobs = data ? JSON.parse(data) : [];
    } catch(e) { jobs = []; }
}

function persist() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(jobs));
}

async function fbSet(job) {
    if (useFirebase) try { await db.collection(COLLECTION).doc(job.id).set(job); } catch(e) { console.warn(e); }
}

async function fbDel(id) {
    if (useFirebase) try { await db.collection(COLLECTION).doc(id).delete(); } catch(e) { console.warn(e); }
}

// ============ COUNTDOWN ============
function getCountdown(deadline) {
    if (!deadline) return { text: '无截止日期', days: 999, cls: 'bg-gray-100 text-gray-500' };
    const now = new Date(); now.setHours(0,0,0,0);
    const dl = new Date(deadline + 'T00:00:00');
    const diff = Math.ceil((dl - now) / 864e5);
    if (diff < 0) return { text: '已截止', days: diff, cls: 'bg-red-100 text-red-600' };
    if (diff === 0) return { text: '今天截止 🔥', days: 0, cls: 'bg-red-100 text-red-600 countdown-urgent' };
    if (diff <= 3) return { text: `${diff}天后截止`, days: diff, cls: 'bg-red-100 text-red-600 countdown-urgent' };
    if (diff <= 7) return { text: `${diff}天后截止`, days: diff, cls: 'bg-amber-100 text-amber-700' };
    return { text: `${diff}天后截止`, days: diff, cls: 'bg-yellow-50 text-yellow-700' };
}

// ============ STATS ============
function renderStats() {
    const now = new Date(); now.setHours(0,0,0,0);
    const total = jobs.length;
    const active = jobs.filter(j => {
        if (j.status === '已投递') return false;
        if (!j.deadline) return true;
        return new Date(j.deadline + 'T00:00:00') >= now;
    }).length;
    const urgent = jobs.filter(j => {
        if (!j.deadline || j.status === '已投递') return false;
        const diff = Math.ceil((new Date(j.deadline + 'T00:00:00') - now) / 864e5);
        return diff >= 0 && diff <= 3;
    }).length;
    const applied = jobs.filter(j => j.status === '已投递').length;

    document.getElementById('stats').innerHTML = `
        <div class="glass-card rounded-2xl p-3 text-center shadow-sm">
            <div class="text-xl font-bold text-blue-600">${total}</div>
            <div class="text-[10px] text-gray-400 mt-0.5">总职位</div>
        </div>
        <div class="glass-card rounded-2xl p-3 text-center shadow-sm">
            <div class="text-xl font-bold text-green-600">${active}</div>
            <div class="text-[10px] text-gray-400 mt-0.5">进行中</div>
        </div>
        <div class="glass-card rounded-2xl p-3 text-center shadow-sm">
            <div class="text-xl font-bold text-red-500">${urgent}</div>
            <div class="text-[10px] text-gray-400 mt-0.5">≤3天</div>
        </div>
        <div class="glass-card rounded-2xl p-3 text-center shadow-sm">
            <div class="text-xl font-bold text-purple-600">${applied}</div>
            <div class="text-[10px] text-gray-400 mt-0.5">已投递</div>
        </div>`;
}

// ============ RENDER ============
function render() {
    renderStats();
    const now = new Date(); now.setHours(0,0,0,0);
    const sorted = [...jobs].sort((a, b) => {
        const dlA = a.deadline ? new Date(a.deadline+'T00:00:00') : new Date('2099-12-31');
        const dlB = b.deadline ? new Date(b.deadline+'T00:00:00') : new Date('2099-12-31');
        const expA = dlA < now ? 1 : 0, expB = dlB < now ? 1 : 0;
        if (expA !== expB) return expA - expB;
        return dlA - dlB;
    });
    const filtered = currentFilter === 'all' ? sorted : sorted.filter(j => j.status === currentFilter);
    const list = document.getElementById('jobList');
    const empty = document.getElementById('emptyState');

    if (!filtered.length) { list.innerHTML = ''; empty.classList.remove('hidden'); return; }
    empty.classList.add('hidden');

    list.innerHTML = filtered.map(job => {
        const cd = getCountdown(job.deadline);
        const isExpired = cd.days < 0;
        const isApplied = job.status === '已投递';
        return `
        <div class="job-card glass-card rounded-2xl shadow-sm mb-3 overflow-hidden ${isExpired ? 'opacity-50' : ''}">
            <div class="p-4">
                <div class="flex items-start justify-between mb-2.5">
                    <h3 class="font-bold text-base text-gray-800 flex-1 mr-2">${esc(job.title||'未命名职位')}</h3>
                    <span class="text-[11px] font-semibold px-2.5 py-1 rounded-full whitespace-nowrap ${cd.cls}">${cd.text}</span>
                </div>
                <div class="flex flex-wrap items-center gap-x-3 gap-y-1.5 text-xs text-gray-500 mb-3">
                    ${job.company ? `<span class="flex items-center gap-1">🏢 ${esc(job.company)}</span>` : ''}
                    ${job.location ? `<span class="flex items-center gap-1">📍 ${esc(job.location)}</span>` : ''}
                    ${job.deadline ? `<span class="flex items-center gap-1">📅 ${job.deadline}</span>` : ''}
                    ${job.source ? `<span class="inline-flex items-center px-2 py-0.5 rounded-full bg-gray-100 text-gray-500 text-[11px]">${esc(job.source)}</span>` : ''}
                </div>
                ${(job.publishDate || job.deadline) ? `
                <div class="grid grid-cols-2 gap-3 mb-3">
                    ${job.publishDate ? `<div><div class="text-[10px] text-amber-500 font-medium mb-0.5">发布日期</div><div class="text-sm font-semibold text-gray-700">${job.publishDate}</div></div>` : '<div></div>'}
                    ${job.deadline ? `<div><div class="text-[10px] text-amber-500 font-medium mb-0.5">截止日期</div><div class="text-sm font-semibold text-gray-700">${job.deadline}</div></div>` : '<div></div>'}
                </div>` : ''}
                ${job.materials ? `
                <div class="mb-3">
                    <div class="text-[10px] text-green-600 font-medium mb-0.5">所需材料</div>
                    <div class="text-sm text-gray-700">${esc(job.materials)}</div>
                </div>` : ''}
                ${job.rawText ? `
                <div class="mb-1">
                    <div class="text-[10px] text-blue-500 font-medium mb-1">原始信息</div>
                    <div class="raw-text bg-gray-50 rounded-xl p-3 text-xs text-gray-600 leading-relaxed border border-gray-100">${esc(job.rawText)}</div>
                </div>` : ''}
            </div>
            <div class="flex items-center gap-2 px-4 pb-3 pt-1">
                <button onclick="toggleStatus('${job.id}')" class="btn-action px-3 py-1.5 rounded-full text-xs font-medium ${isApplied ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-green-50 text-green-700 border border-green-200'}">
                    ${isApplied ? '✅ 已投递' : '☑️ 标记已投递'}
                </button>
                <button onclick="openEditModal('${job.id}')" class="btn-action px-3 py-1.5 rounded-full text-xs font-medium bg-amber-50 text-amber-700 border border-amber-200">✏️ 编辑</button>
                <button onclick="deleteJob('${job.id}')" class="btn-action px-3 py-1.5 rounded-full text-xs font-medium bg-red-50 text-red-500 border border-red-200">🗑️ 删除</button>
            </div>
        </div>`;
    }).join('');
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ============ FILTER ============
function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(btn => {
        const on = btn.dataset.filter === f;
        btn.className = `filter-btn px-3.5 py-1.5 rounded-full text-xs shadow-sm ${on ? 'font-semibold bg-blue-500 text-white' : 'font-medium bg-white text-gray-500'}`;
    });
    render();
}

// ============ MODAL ============
function openAddModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = '📌 添加职位';
    clearForm();
    document.getElementById('modal').classList.remove('hidden');
}

function openEditModal(id) {
    const job = jobs.find(j => j.id === id);
    if (!job) return;
    editingId = id;
    document.getElementById('modalTitle').textContent = '✏️ 编辑职位';
    document.getElementById('rawInput').value = job.rawText || '';
    document.getElementById('fTitle').value = job.title || '';
    document.getElementById('fCompany').value = job.company || '';
    document.getElementById('fLocation').value = job.location || '';
    document.getElementById('fPublishDate').value = job.publishDate || '';
    document.getElementById('fDeadline').value = job.deadline || '';
    document.getElementById('fMaterials').value = job.materials || '';
    document.getElementById('fSource').value = job.source || '';
    document.getElementById('modal').classList.remove('hidden');
}

function closeModal() { document.getElementById('modal').classList.add('hidden'); }

function clearForm() {
    ['rawInput','fTitle','fCompany','fLocation','fPublishDate','fDeadline','fMaterials','fSource'].forEach(id => document.getElementById(id).value = '');
}

// ============ EXTRACT ============
function extractFromRaw() {
    const text = document.getElementById('rawInput').value.trim();
    if (!text) return;

    let m = text.match(/岗位名称[：:]\s*([^。\n，,；;（(]+)/) || text.match(/职位[名称]*[：:]\s*([^。\n，,]+)/);
    if (m) document.getElementById('fTitle').value = m[1].trim();

    m = text.match(/(?:单位|用人单位|招聘单位)[名称]*[：:]\s*([^。\n，,；;]+)/) ||
        text.match(/([\u4e00-\u9fa5]+(?:实验室|研究院|研究所|大学|学院|公司|集团|中心|医院|局|委员会))/);
    if (m) document.getElementById('fCompany').value = m[1].trim();

    m = text.match(/工作地[点址][：:]\s*([^。\n，,；;]+)/) || text.match(/地[点址][：:]\s*([^。\n，,；;]+)/);
    if (m) document.getElementById('fLocation').value = m[1].trim();

    const dateReg = /(\d{4})[年\-\/](\d{1,2})[月\-\/](\d{1,2})[日号]?/g;
    const dates = []; let dm;
    while ((dm = dateReg.exec(text)) !== null) {
        dates.push(`${dm[1]}-${dm[2].padStart(2,'0')}-${dm[3].padStart(2,'0')}`);
    }
    if (dates.length >= 2) {
        document.getElementById('fPublishDate').value = dates[0];
        document.getElementById('fDeadline').value = dates[dates.length - 1];
    } else if (dates.length === 1) {
        document.getElementById('fDeadline').value = dates[0];
    }

    m = text.match(/(?:所需|申请|报名|提交)材料[：:]\s*([^。\n]+)/) || text.match(/(?:需提交|请提供|需提供)[：:]?\s*([^。\n]+)/);
    if (m) document.getElementById('fMaterials').value = m[1].trim();
}

// ============ SAVE ============
async function saveJob() {
    const title = document.getElementById('fTitle').value.trim();
    if (!title) { alert('请填写岗位名称'); return; }

    const data = {
        title,
        company: document.getElementById('fCompany').value.trim(),
        location: document.getElementById('fLocation').value.trim(),
        publishDate: document.getElementById('fPublishDate').value,
        deadline: document.getElementById('fDeadline').value,
        materials: document.getElementById('fMaterials').value.trim(),
        source: document.getElementById('fSource').value.trim(),
        rawText: document.getElementById('rawInput').value.trim(),
    };

    if (editingId) {
        const idx = jobs.findIndex(j => j.id === editingId);
        if (idx !== -1) { jobs[idx] = { ...jobs[idx], ...data }; await fbSet(jobs[idx]); }
    } else {
        data.id = 'job_' + Date.now() + '_' + Math.random().toString(36).substr(2,6);
        data.status = '待投递';
        data.createdAt = new Date().toISOString();
        jobs.push(data);
        await fbSet(data);
    }

    persist();
    closeModal();
    render();
}

// ============ ACTIONS ============
async function toggleStatus(id) {
    const job = jobs.find(j => j.id === id);
    if (!job) return;
    job.status = job.status === '已投递' ? '待投递' : '已投递';
    persist(); await fbSet(job); render();
}

async function deleteJob(id) {
    if (!confirm('确定删除这条记录吗？')) return;
    jobs = jobs.filter(j => j.id !== id);
    persist(); await fbDel(id); render();
}
</script>
</body>
</html>
