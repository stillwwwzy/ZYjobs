<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ZYJobs">
    <title>ZYJobs - 求职信息管理台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif; }
        .modal-overlay { animation: fadeIn 0.2s ease; }
        .modal-box { animation: slideUp 0.25s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .job-card { animation: cardIn 0.25s ease; }
        @keyframes cardIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        textarea, input, select { font-size: 16px !important; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50 min-h-screen">

<div id="app" class="max-w-2xl mx-auto p-4 pb-24">
    <div class="mb-5">
        <h1 class="text-2xl font-bold text-gray-800">📋 ZYJobs</h1>
        <p class="text-gray-400 text-sm mt-0.5">粘贴职位信息 → 自动提取 → 按截止日期排序</p>
        <div id="syncStatus" class="text-xs text-gray-400 mt-1">⏳ 正在连接云端...</div>
    </div>

    <div id="stats" class="grid grid-cols-4 gap-2 mb-4"></div>

    <div class="flex flex-col gap-3 mb-4">
        <button onclick="openPasteModal()" class="flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-medium px-5 py-3 rounded-xl shadow-sm transition-colors text-sm">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><path d="M9 14l2 2 4-4"/></svg>
            粘贴新职位信息
        </button>
        <div class="flex gap-2 overflow-x-auto pb-1">
            <button onclick="setFilter('all')" class="filter-btn px-3 py-1.5 rounded-lg text-xs font-medium whitespace-nowrap bg-blue-100 text-blue-700" data-filter="all">全部</button>
            <button onclick="setFilter('待投递')" class="filter-btn px-3 py-1.5 rounded-lg text-xs font-medium whitespace-nowrap bg-gray-100 text-gray-600" data-filter="待投递">待投递</button>
            <button onclick="setFilter('已投递')" class="filter-btn px-3 py-1.5 rounded-lg text-xs font-medium whitespace-nowrap bg-gray-100 text-gray-600" data-filter="已投递">已投递</button>
            <button onclick="setFilter('笔试')" class="filter-btn px-3 py-1.5 rounded-lg text-xs font-medium whitespace-nowrap bg-gray-100 text-gray-600" data-filter="笔试">笔试</button>
            <button onclick="setFilter('面试中')" class="filter-btn px-3 py-1.5 rounded-lg text-xs font-medium whitespace-nowrap bg-gray-100 text-gray-600" data-filter="面试中">面试中</button>
            <button onclick="setFilter('已offer')" class="filter-btn px-3 py-1.5 rounded-lg text-xs font-medium whitespace-nowrap bg-gray-100 text-gray-600" data-filter="已offer">已offer</button>
            <button onclick="setFilter('已拒绝')" class="filter-btn px-3 py-1.5 rounded-lg text-xs font-medium whitespace-nowrap bg-gray-100 text-gray-600" data-filter="已拒绝">已拒绝</button>
        </div>
    </div>

    <div id="jobList" class="flex flex-col gap-3"></div>
    <div id="emptyState" class="text-center py-16 text-gray-400">
        <div class="text-4xl mb-3">📭</div>
        <p class="text-sm">还没有职位信息</p>
        <p class="text-xs mt-1">点击上方按钮粘贴职位信息</p>
    </div>
</div>

<!-- Paste Modal -->
<div id="pasteModal" class="fixed inset-0 z-50 hidden">
    <div class="modal-overlay absolute inset-0 bg-black/40" onclick="closePasteModal()"></div>
    <div class="modal-box absolute bottom-0 left-0 right-0 bg-white rounded-t-2xl p-5 max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-bold text-gray-800">粘贴职位信息</h2>
            <button onclick="closePasteModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
        </div>
        <textarea id="pasteInput" class="w-full h-40 border border-gray-200 rounded-xl p-3 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="粘贴招聘信息，例如：&#10;公司：字节跳动&#10;职位：前端工程师&#10;截止日期：2026-05-01&#10;薪资：25-40K&#10;地点：北京"></textarea>
        <button onclick="parseAndAdd()" class="w-full mt-3 bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-xl transition-colors text-sm">✨ 智能提取并添加</button>
        <div class="mt-4 pt-4 border-t border-gray-100">
            <p class="text-xs text-gray-400 mb-3">或者手动填写：</p>
            <div class="flex flex-col gap-2.5">
                <input id="manualCompany" class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="公司名称 *">
                <input id="manualPosition" class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="职位名称 *">
                <input id="manualDeadline" type="date" class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <input id="manualSalary" class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="薪资（如 25-40K）">
                <input id="manualLocation" class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="工作地点">
                <textarea id="manualNotes" class="border border-gray-200 rounded-lg px-3 py-2 text-sm resize-none h-20 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="备注"></textarea>
                <button onclick="manualAdd()" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-medium py-3 rounded-xl transition-colors text-sm">手动添加</button>
            </div>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div id="editModal" class="fixed inset-0 z-50 hidden">
    <div class="modal-overlay absolute inset-0 bg-black/40" onclick="closeEditModal()"></div>
    <div class="modal-box absolute bottom-0 left-0 right-0 bg-white rounded-t-2xl p-5 max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-bold text-gray-800">编辑职位</h2>
            <button onclick="closeEditModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
        </div>
        <input type="hidden" id="editId">
        <div class="flex flex-col gap-2.5">
            <input id="editCompany" class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="公司名称">
            <input id="editPosition" class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="职位名称">
            <select id="editStatus" class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="待投递">待投递</option>
                <option value="已投递">已投递</option>
                <option value="笔试">笔试</option>
                <option value="面试中">面试中</option>
                <option value="已offer">已offer</option>
                <option value="已拒绝">已拒绝</option>
            </select>
            <input id="editDeadline" type="date" class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <input id="editSalary" class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="薪资">
            <input id="editLocation" class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="工作地点">
            <textarea id="editNotes" class="border border-gray-200 rounded-lg px-3 py-2 text-sm resize-none h-20 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="备注"></textarea>
            <button onclick="saveEdit()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-xl transition-colors text-sm">保存修改</button>
            <button onclick="deleteJob()" class="w-full bg-red-50 hover:bg-red-100 text-red-600 font-medium py-3 rounded-xl transition-colors text-sm">删除此职位</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBEvHKR3qvlgqeKQzy3GHio258Tc9-doqU",
        authDomain: "zyjobs-5c05e.firebaseapp.com",
        projectId: "zyjobs-5c05e",
        storageBucket: "zyjobs-5c05e.firebasestorage.app",
        messagingSenderId: "521015429937",
        appId: "1:521015429937:web:2e40a6a5faa0ab77eafe10",
        measurementId: "G-GSNWDW6FEM"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const jobsRef = db.collection('jobs');

    let jobs = [];
    let currentFilter = 'all';

    const statusConfig = {
        '待投递': { color: 'bg-gray-100 text-gray-700', icon: '⏳' },
        '已投递': { color: 'bg-blue-100 text-blue-700', icon: '📨' },
        '笔试': { color: 'bg-purple-100 text-purple-700', icon: '📝' },
        '面试中': { color: 'bg-amber-100 text-amber-700', icon: '💬' },
        '已offer': { color: 'bg-green-100 text-green-700', icon: '🎉' },
        '已拒绝': { color: 'bg-red-100 text-red-700', icon: '😢' }
    };

    // Real-time sync
    jobsRef.orderBy('createdAt', 'desc').onSnapshot((snapshot) => {
        jobs = [];
        snapshot.forEach(doc => jobs.push({ id: doc.id, ...doc.data() }));
        // Sort: by deadline (empty deadline goes last)
        jobs.sort((a, b) => {
            if (!a.deadline && !b.deadline) return 0;
            if (!a.deadline) return 1;
            if (!b.deadline) return -1;
            return a.deadline.localeCompare(b.deadline);
        });
        renderAll();
        document.getElementById('syncStatus').innerHTML = '🟢 已连接云端同步';
    }, (error) => {
        console.error('Firestore error:', error);
        document.getElementById('syncStatus').innerHTML = '🔴 同步失败，请检查网络';
    });

    function renderAll() { renderStats(); renderJobs(); }

    function renderStats() {
        const total = jobs.length;
        const applied = jobs.filter(j => j.status === '已投递').length;
        const interviewing = jobs.filter(j => ['笔试', '面试中'].includes(j.status)).length;
        const offered = jobs.filter(j => j.status === '已offer').length;
        document.getElementById('stats').innerHTML = `
            <div class="bg-white rounded-xl p-3 text-center shadow-sm">
                <div class="text-xl font-bold text-gray-800">${total}</div>
                <div class="text-xs text-gray-400 mt-0.5">总计</div>
            </div>
            <div class="bg-white rounded-xl p-3 text-center shadow-sm">
                <div class="text-xl font-bold text-blue-600">${applied}</div>
                <div class="text-xs text-gray-400 mt-0.5">已投递</div>
            </div>
            <div class="bg-white rounded-xl p-3 text-center shadow-sm">
                <div class="text-xl font-bold text-amber-600">${interviewing}</div>
                <div class="text-xs text-gray-400 mt-0.5">进行中</div>
            </div>
            <div class="bg-white rounded-xl p-3 text-center shadow-sm">
                <div class="text-xl font-bold text-green-600">${offered}</div>
                <div class="text-xs text-gray-400 mt-0.5">已offer</div>
            </div>`;
    }

    function renderJobs() {
        const filtered = currentFilter === 'all' ? jobs : jobs.filter(j => j.status === currentFilter);
        const listEl = document.getElementById('jobList');
        const emptyEl = document.getElementById('emptyState');
        if (filtered.length === 0) { listEl.innerHTML = ''; emptyEl.classList.remove('hidden'); return; }
        emptyEl.classList.add('hidden');
        listEl.innerHTML = filtered.map(job => {
            const sc = statusConfig[job.status] || statusConfig['待投递'];
            const deadlineText = job.deadline ? formatDeadline(job.deadline) : '';
            const isUrgent = job.deadline && getDaysLeft(job.deadline) <= 3 && getDaysLeft(job.deadline) >= 0;
            const isExpired = job.deadline && getDaysLeft(job.deadline) < 0;
            return `
                <div class="job-card bg-white rounded-xl p-4 shadow-sm border border-gray-100 active:bg-gray-50 transition-colors cursor-pointer" onclick="openEditModal('${job.id}')">
                    <div class="flex justify-between items-start mb-1">
                        <div class="flex-1 min-w-0">
                            <h3 class="font-bold text-gray-800 text-sm truncate">${esc(job.company || '未知公司')}</h3>
                            <p class="text-gray-500 text-xs mt-0.5 truncate">${esc(job.position || '未知职位')}</p>
                        </div>
                        <span class="${sc.color} px-2 py-1 rounded-lg text-xs font-medium ml-2 whitespace-nowrap">${sc.icon} ${job.status}</span>
                    </div>
                    <div class="flex flex-wrap items-center gap-3 text-xs text-gray-400 mt-2">
                        ${job.deadline ? `<span class="${isExpired ? 'text-red-500 font-medium' : isUrgent ? 'text-amber-500 font-medium' : ''}">📅 ${deadlineText}</span>` : ''}
                        ${job.salary ? `<span>💰 ${esc(job.salary)}</span>` : ''}
                        ${job.location ? `<span>📍 ${esc(job.location)}</span>` : ''}
                    </div>
                    ${job.notes ? `<p class="text-xs text-gray-400 mt-2 truncate">📝 ${esc(job.notes)}</p>` : ''}
                </div>`;
        }).join('');
    }

    function formatDeadline(d) {
        const days = getDaysLeft(d);
        if (days < 0) return `已过期${Math.abs(days)}天`;
        if (days === 0) return '今天截止⚠️';
        if (days === 1) return '明天截止⚠️';
        if (days <= 3) return `${days}天后截止⚠️`;
        return d;
    }

    function getDaysLeft(d) {
        return Math.floor((new Date(d + 'T23:59:59') - new Date()) / 86400000);
    }

    function setFilter(f) {
        currentFilter = f;
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.className = btn.dataset.filter === f
                ? 'filter-btn px-3 py-1.5 rounded-lg text-xs font-medium whitespace-nowrap bg-blue-100 text-blue-700'
                : 'filter-btn px-3 py-1.5 rounded-lg text-xs font-medium whitespace-nowrap bg-gray-100 text-gray-600';
        });
        renderJobs();
    }

    function parseJobText(text) {
        const r = { company: '', position: '', deadline: '', salary: '', location: '', notes: '' };
        const lines = text.split(/[\n\r]+/).map(l => l.trim()).filter(l => l);
        for (const line of lines) {
            if (/公司[名称]?[：:]/.test(line)) r.company = line.replace(/.*公司[名称]?[：:]\s*/, '');
            else if (/企业[名称]?[：:]/.test(line)) r.company = line.replace(/.*企业[名称]?[：:]\s*/, '');
            if (/职位[名称]?[：:]/.test(line)) r.position = line.replace(/.*职位[名称]?[：:]\s*/, '');
            else if (/岗位[名称]?[：:]/.test(line)) r.position = line.replace(/.*岗位[名称]?[：:]\s*/, '');
            else if (/招聘[：:]/.test(line)) r.position = line.replace(/.*招聘[：:]\s*/, '');
            if (/(截止|截至|deadline)/i.test(line)) {
                const m = line.match(/(\d{4}[-/.]\d{1,2}[-/.]\d{1,2})/);
                if (m) r.deadline = m[1].replace(/[/.]/g, '-');
            }
            if (/薪[资酬水][：:]/.test(line) || /待遇[：:]/.test(line)) {
                r.salary = line.replace(/.*[：:]\s*/, '');
            } else if (!r.salary && /\d+[kK万]/.test(line)) {
                const m = line.match(/[\d.]+-?[\d.]*[kK万][/月年]?/);
                if (m) r.salary = m[0];
            }
            if (/地[点址][：:]/.test(line) || /工作地[点址]?[：:]/.test(line)) {
                r.location = line.replace(/.*[：:]\s*/, '');
            }
        }
        if (!r.company && lines.length > 0) r.company = lines[0];
        if (!r.position && lines.length > 1) r.position = lines[1];
        r.notes = text.substring(0, 200);
        return r;
    }

    async function addJob(data) {
        try {
            await jobsRef.add({
                company: data.company || '', position: data.position || '',
                deadline: data.deadline || '', salary: data.salary || '',
                location: data.location || '', status: '待投递',
                notes: data.notes || '',
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
        } catch (e) { alert('添加失败：' + e.message); }
    }

    function parseAndAdd() {
        const text = document.getElementById('pasteInput').value.trim();
        if (!text) { alert('请先粘贴职位信息'); return; }
        addJob(parseJobText(text));
        document.getElementById('pasteInput').value = '';
        closePasteModal();
    }

    function manualAdd() {
        const company = document.getElementById('manualCompany').value.trim();
        const position = document.getElementById('manualPosition').value.trim();
        if (!company && !position) { alert('请至少填写公司名称或职位名称'); return; }
        addJob({
            company, position,
            deadline: document.getElementById('manualDeadline').value,
            salary: document.getElementById('manualSalary').value.trim(),
            location: document.getElementById('manualLocation').value.trim(),
            notes: document.getElementById('manualNotes').value.trim()
        });
        ['manualCompany','manualPosition','manualDeadline','manualSalary','manualLocation','manualNotes'].forEach(id => document.getElementById(id).value = '');
        closePasteModal();
    }

    function openEditModal(id) {
        const job = jobs.find(j => j.id === id);
        if (!job) return;
        document.getElementById('editId').value = id;
        document.getElementById('editCompany').value = job.company || '';
        document.getElementById('editPosition').value = job.position || '';
        document.getElementById('editStatus').value = job.status || '待投递';
        document.getElementById('editDeadline').value = job.deadline || '';
        document.getElementById('editSalary').value = job.salary || '';
        document.getElementById('editLocation').value = job.location || '';
        document.getElementById('editNotes').value = job.notes || '';
        document.getElementById('editModal').classList.remove('hidden');
    }

    function closeEditModal() { document.getElementById('editModal').classList.add('hidden'); }

    async function saveEdit() {
        const id = document.getElementById('editId').value;
        try {
            await jobsRef.doc(id).update({
                company: document.getElementById('editCompany').value.trim(),
                position: document.getElementById('editPosition').value.trim(),
                status: document.getElementById('editStatus').value,
                deadline: document.getElementById('editDeadline').value,
                salary: document.getElementById('editSalary').value.trim(),
                location: document.getElementById('editLocation').value.trim(),
                notes: document.getElementById('editNotes').value.trim(),
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            closeEditModal();
        } catch (e) { alert('保存失败：' + e.message); }
    }

    async function deleteJob() {
        if (!confirm('确定删除这个职位吗？')) return;
        try { await jobsRef.doc(document.getElementById('editId').value).delete(); closeEditModal(); }
        catch (e) { alert('删除失败：' + e.message); }
    }

    function openPasteModal() { document.getElementById('pasteModal').classList.remove('hidden'); }
    function closePasteModal() { document.getElementById('pasteModal').classList.add('hidden'); document.getElementById('pasteInput').value = ''; }

    function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
</script>
</body>
</html>
